# Production Configuration for X-IDS

api:
  host: "0.0.0.0"
  port: 8000
  workers: 8
  reload: false

models:
  default: "rf"
  models_dir: "/app/models"
  autoload: true

logging:
  level: "WARNING"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "/var/log/xids/api.log"

database:
  url: "${DB_URL}"
  pool_size: 50
  max_overflow: 20

kafka:
  bootstrap_servers: "${KAFKA_SERVERS}"
  consumer_group: "xids-inference-prod"
  topics:
    - "network-traffic"
    - "threat-alerts"

siem:
  elasticsearch:
    enabled: true
    host: "${ES_HOST}"
    port: 9200
  splunk:
    enabled: true
    host: "${SPLUNK_HOST}"
    port: 8089

security:
  jwt_secret: "${JWT_SECRET}"
  jwt_expiry_hours: 24
  rate_limit_per_minute: 1000
  enable_tls: true
  tls_cert: "${TLS_CERT_PATH}"
  tls_key: "${TLS_KEY_PATH}"

performance:
  batch_size: 64
  num_workers: 8
  use_gpu: true

monitoring:
  prometheus_enabled: true
  prometheus_port: 9090
  metrics_path: "/metrics"
