# Docker Compose for local X-IDS development and testing

version: '3.8'

services:
  # X-IDS API Server
  x-ids-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: x-ids-api
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - MODEL_DIR=/data/models
      - LOG_DIR=/data/logs
      - LOG_LEVEL=INFO
      - KAFKA_BROKER=kafka:9092
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./training/config.yaml:/etc/x-ids/config.yaml:ro
      - models-volume:/data/models
      - logs-volume:/data/logs
    depends_on:
      - kafka
      - redis
    networks:
      - x-ids-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Kafka for streaming alerts
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: x-ids-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    networks:
      - x-ids-network
    restart: unless-stopped

  # Zookeeper for Kafka coordination
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: x-ids-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - x-ids-network
    restart: unless-stopped

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: x-ids-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-volume:/data
    networks:
      - x-ids-network
    command: redis-server --appendonly yes
    restart: unless-stopped

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: x-ids-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-volume:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - x-ids-network
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: x-ids-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-volume:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus
    networks:
      - x-ids-network
    restart: unless-stopped

  # ELK Stack - Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.5.0
    container_name: x-ids-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ELASTIC_PASSWORD=changeme
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-volume:/usr/share/elasticsearch/data
    networks:
      - x-ids-network
    restart: unless-stopped

  # ELK Stack - Logstash
  logstash:
    image: docker.elastic.co/logstash/logstash:8.5.0
    container_name: x-ids-logstash
    volumes:
      - ./monitoring/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - logs-volume:/var/log/x-ids
    ports:
      - "5000:5000"
    depends_on:
      - elasticsearch
    networks:
      - x-ids-network
    restart: unless-stopped

  # ELK Stack - Kibana
  kibana:
    image: docker.elastic.co/kibana/kibana:8.5.0
    container_name: x-ids-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - x-ids-network
    restart: unless-stopped

  # Postgres for storage (optional)
  postgres:
    image: postgres:15-alpine
    container_name: x-ids-postgres
    environment:
      POSTGRES_DB: x_ids
      POSTGRES_USER: xids
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    networks:
      - x-ids-network
    restart: unless-stopped

  # pgAdmin for database management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: x-ids-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@x-ids.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - x-ids-network
    restart: unless-stopped

volumes:
  models-volume:
    driver: local
  logs-volume:
    driver: local
  redis-volume:
    driver: local
  prometheus-volume:
    driver: local
  grafana-volume:
    driver: local
  elasticsearch-volume:
    driver: local
  postgres-volume:
    driver: local

networks:
  x-ids-network:
    driver: bridge
