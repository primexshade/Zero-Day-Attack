services:
  # X-IDS API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xids-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_DIR=/data/models
      - LOG_DIR=/data/logs
      - LOG_LEVEL=INFO
      - KAFKA_BROKER=kafka:9092
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./configs/default.yaml:/etc/xids/config.yaml:ro
      - models-volume:/data/models
      - logs-volume:/data/logs
    depends_on:
      - kafka
      - redis
      - elasticsearch
    networks:
      - xids-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Kafka for streaming alerts
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: xids-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    networks:
      - xids-network
    restart: unless-stopped

  # Zookeeper for Kafka coordination
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: xids-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - xids-network
    restart: unless-stopped

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: xids-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-volume:/data
    networks:
      - xids-network
    command: redis-server --appendonly yes
    restart: unless-stopped

  # Elasticsearch for SIEM integration
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.5.0
    container_name: xids-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ELASTIC_PASSWORD=changeme
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-volume:/usr/share/elasticsearch/data
    networks:
      - xids-network
    restart: unless-stopped

  # Kibana for log visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.5.0
    container_name: xids-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - xids-network
    restart: unless-stopped

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: xids-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-volume:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - xids-network
    restart: unless-stopped

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: xids-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-volume:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - xids-network
    restart: unless-stopped

volumes:
  models-volume:
    driver: local
  logs-volume:
    driver: local
  redis-volume:
    driver: local
  elasticsearch-volume:
    driver: local
  prometheus-volume:
    driver: local
  grafana-volume:
    driver: local

networks:
  xids-network:
    driver: bridge
